<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form >

        <!-- HTML5 Input-->
        <label for="name">Name</label><br>
        <input type="text" id = "name" name = "name"><br>
        <label for="email">Email</label><br>
        <input type="email" id = "email" name="email"><br>
        <label for="password">Password</label><br>
        <input type="password" name="password" id="password"><br>
        <label for="date">Date</label><br>
        <input type="date" id="date" name="date"><br>

        Gender <br>
        Male
        <input type="radio" name = "gender" value="Male" checked>
        Female
        <input type="radio" name = "gender" value="female">
        Other
        <input type="radio" name = "gender" value="Other"><br>

        Hobbies <br>
        Technology
        <input type="checkbox" name = "tech" id = "tech">
        Music
        <input type="checkbox" name = "music" id = "music">
        Art
        <input type="checkbox" name = "art" id = "art" checked><br>

        Degree <br>
        <select name="degree" id="degree">
            <option value="Bachelor" selected>Lisans</option>
            <option value="Msc">Yüksek Lisans</option>
            <option value="Phd">Doktora</option>
        </select><br>

        <textarea name="message" id="message" cols="30" rows="10" placeholder="Why are you waiting?"></textarea><br>

       





        <input type="submit" value="Submit">
        <button type = "submit">Gönder</button>
        <input type="reset" value="Sıfırla">


        

    </form>
</body>
</html>
